services:
  - type: web
    name: calendar-booking
    env: docker
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: calendar-booking-db
          property: connectionString
      - key: WEB_URL
        fromService:
          type: web
          name: calendar-booking
          property: url

databases:
  - name: calendar-booking-db
    databaseName: calendar_booking
    user: calendar
    plan: free
